<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkedIn</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Extra inline styles for icons & quick overrides */
    .nav-icon { width:24px; height:24px; display:block; }
    .li-post-modal__image-preview { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
    .li-post-modal__image-preview img { width:80px; height:80px; object-fit:cover; border-radius:4px; }
    .li-post-char-count { font-size:12px; color:var(--text-3); text-align:right; margin-top:4px; }
    .li-apply-progress { display:flex; gap:4px; margin-bottom:16px; }
    .li-apply-dot { height:4px; flex:1; border-radius:2px; background:var(--border); }
    .li-apply-dot.done { background:var(--blue); }
    .li-settings-form-row { display:flex; gap:12px; margin-bottom:12px; flex-wrap:wrap; }
    .li-settings-input { flex:1; min-width:200px; height:44px; border:1px solid var(--border-2); border-radius:4px; padding:0 12px; font-size:14px; outline:none; font-family:inherit; background:var(--white); color:var(--text); }
    .li-settings-input:focus { border-color:var(--blue); box-shadow:0 0 0 2px rgba(10,102,194,0.2); }
    .li-job-detail-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 24px; color:var(--text-2); text-align:center; }
    .li-job-detail-empty svg { margin-bottom:16px; opacity:0.3; }
    .li-group-tab { padding:14px 20px; font-size:14px; font-weight:600; color:var(--text-2); cursor:pointer; border-bottom:2px solid transparent; background:none; border-top:none; border-left:none; border-right:none; transition:color 0.15s; }
    .li-group-tab.active { color:var(--text); border-bottom-color:var(--text); }
  </style>
</head>
<body>

<!-- React mounts the entire app here -->
<div id="react-root"></div>

<!-- ═══════════════════════════════════════════════
     SCRIPTS
     Load order: CDN libs → plain JS → Babel components
═══════════════════════════════════════════════ -->

<!-- React 18 + ReactDOM 18 (UMD builds, no build step needed) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<!-- Babel standalone — transforms type="text/babel" scripts in-browser -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- API utility (plain JS, no JSX) -->
<script src="js/api.js"></script>

<!-- ── Shared utilities & context ──────────────────────────── -->
<script type="text/babel" src="js/components/utils.js"></script>
<script type="text/babel" src="js/components/AppContext.js"></script>

<!-- ── Shared UI components ────────────────────────────────── -->
<script type="text/babel" src="js/components/shared/Avatar.js"></script>
<script type="text/babel" src="js/components/shared/LoadingSpinner.js"></script>
<script type="text/babel" src="js/components/ToastContainer.js"></script>

<!-- ── Page components ─────────────────────────────────────── -->
<script type="text/babel" src="js/components/pages/FeedPage.js"></script>
<script type="text/babel" src="js/components/pages/ProfilePage.js"></script>
<script type="text/babel" src="js/components/pages/NetworkPage.js"></script>
<script type="text/babel" src="js/components/pages/JobsPage.js"></script>
<script type="text/babel" src="js/components/pages/MessagingPage.js"></script>
<script type="text/babel" src="js/components/pages/NotificationsPage.js"></script>
<script type="text/babel" src="js/components/pages/SearchPage.js"></script>
<script type="text/babel" src="js/components/pages/CompanyPage.js"></script>
<script type="text/babel" src="js/components/pages/GroupsPage.js"></script>
<script type="text/babel" src="js/components/pages/GroupDetailPage.js"></script>
<script type="text/babel" src="js/components/pages/EventsPage.js"></script>
<script type="text/babel" src="js/components/pages/LearningPage.js"></script>
<script type="text/babel" src="js/components/pages/SettingsPage.js"></script>
<script type="text/babel" src="js/components/pages/PremiumPage.js"></script>

<!-- ── Modal components ────────────────────────────────────── -->
<script type="text/babel" src="js/components/modals/PostModal.js"></script>
<script type="text/babel" src="js/components/modals/ImageViewerModal.js"></script>
<script type="text/babel" src="js/components/modals/ConnectModal.js"></script>
<script type="text/babel" src="js/components/modals/ShareModal.js"></script>
<script type="text/babel" src="js/components/modals/ApplyModal.js"></script>
<script type="text/babel" src="js/components/modals/EditProfileModal.js"></script>
<script type="text/babel" src="js/components/modals/AddExpModal.js"></script>
<script type="text/babel" src="js/components/modals/ReportModal.js"></script>
<script type="text/babel" src="js/components/modals/CreateEventModal.js"></script>
<script type="text/babel" src="js/components/modals/ModalContainer.js"></script>

<!-- ── Navigation components ───────────────────────────────── -->
<script type="text/babel" src="js/components/NavBar.js"></script>
<script type="text/babel" src="js/components/MobileNav.js"></script>

<!-- ── Root — mounts React app (must be last) ──────────────── -->
<script type="text/babel" src="js/components/App.js"></script>

</body>
</html>
